<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DiscordServer</title>
    <meta name="description" content="プログラミング向けディスコードサーバーです">
    <style>
        :root {
            --primary-color: #333;
            --bg-color: #2e2e2e;
            --accent-color: #262626;
            --text-color: #c2c2c2;
            --secondary-text: #666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
        }

        header {
            padding: 80px 20px;
            text-align: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .version-badge {
            display: inline-block;
            background: var(--primary-color);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 3rem;
            margin: 10px 0;
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 1.25rem;
            color: var(--secondary-text);
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-outline {
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        section {
            margin-bottom: 60px;
        }

        h2 {
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .feature-card {
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 12px;
            background: #fafafa;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.9rem;
            color: #999;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

<header>
    <h1>NextHub</h1>
    <div class="version-badge">1.0.0</div>
    <p class="tagline">NextHubは、Mikancat10が運営するDiscordServerです。</p>
    <div class="btn-group">
        <a href="https://discord.gg/xzAhfad9TR" class="btn btn-primary">Discordに参加</a>
    </div>
</header>

<div class="container">
    <section id="about">
        <h2>NextHubとは？</h2>
        <p>NextHubは、DiscordServerの名前です
    <section id="features">
        <h2>主な特徴</h2>
        <div class="features">
            <div class="feature-card">
                <h3>プログラミング
                <p>NextHubでは、プログラミングに関する情報を提供しています。</p>
            </div>
            <div class="feature-card">
                <h3>いろいろなプログラミングの種類</h3>
                <p>NextHubでは、さまざまなプログラミング言語に関する情報を提供しています。</p>
            </div>

        </div>
    </section>
</div>

<footer>
    <p>Copyright &copy; 2026 monochrome Project. All rights reserved.</p>
</footer>

</body>
</html>
